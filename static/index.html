<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧法务大脑</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #667085;
      --line: #d7dde5;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --warn: #92400e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    h1 { margin: 0; font-size: 22px; }
    .badge {
      color: var(--brand-dark);
      background: #dff7f2;
      border: 1px solid #a7e3d6;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
    }
    main {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      padding: 16px;
      min-height: 0;
    }
    aside, section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    aside { padding: 16px; }
    .mode {
      display: grid;
      gap: 8px;
      margin-bottom: 20px;
    }
    label { font-size: 13px; color: var(--muted); }
    select, textarea, input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      font: inherit;
      background: #fff;
    }
    .chat {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 0;
    }
    #messages {
      padding: 18px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 82%;
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.65;
      white-space: pre-wrap;
    }
    .user { align-self: flex-end; background: #dff7f2; }
    .assistant { align-self: flex-start; background: #f3f4f6; }
    .composer {
      border-top: 1px solid var(--line);
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }
    button {
      border: 0;
      background: var(--brand);
      color: #fff;
      border-radius: 6px;
      padding: 0 18px;
      cursor: pointer;
      font-weight: 600;
    }
    .hint {
      color: var(--warn);
      font-size: 13px;
      line-height: 1.6;
    }
    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; }
      .message { max-width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>智慧法务大脑</h1>
    <span class="badge">法律 RAG · 合同 Agent 接口</span>
  </header>
  <main>
    <aside>
      <div class="mode">
        <label for="sourceFilter">法律领域</label>
        <select id="sourceFilter">
          <option value="">全部领域</option>
        </select>
      </div>
      <div class="mode">
        <label for="agentMode">工作模式</label>
        <select id="agentMode">
          <option value="legal_qa">法律问答</option>
          <option value="contract_review">合同审查</option>
          <option value="contract_drafting">合同制作</option>
        </select>
      </div>
      <p class="hint">提示：当前版本优先提供法律 RAG。合同审查和合同制作接口已预留，将在后续 Agent 阶段接入规则生成、模板填槽和多 Agent 协同。</p>
    </aside>
    <section class="chat">
      <div id="messages">
        <div class="message assistant">您好，我是智慧法务大脑。请描述公司法、合同、劳动用工或争议解决相关问题。</div>
      </div>
      <div class="composer">
        <textarea id="queryInput" rows="3" placeholder="例如：劳动合同未约定试用期工资有哪些风险？"></textarea>
        <button id="sendBtn">发送</button>
      </div>
    </section>
  </main>
  <script>
    const API_BASE = window.location.origin;
    let sessionId = null;

    const messages = document.getElementById("messages");
    const input = document.getElementById("queryInput");
    const sendBtn = document.getElementById("sendBtn");
    const sourceFilter = document.getElementById("sourceFilter");
    const agentMode = document.getElementById("agentMode");

    function addMessage(role, text) {
      const node = document.createElement("div");
      node.className = `message ${role}`;
      node.textContent = text;
      messages.appendChild(node);
      messages.scrollTop = messages.scrollHeight;
      return node;
    }

    async function init() {
      const sessionResp = await fetch(`${API_BASE}/api/create_session`, { method: "POST" });
      sessionId = (await sessionResp.json()).session_id;
      const sourcesResp = await fetch(`${API_BASE}/api/sources`);
      const { sources } = await sourcesResp.json();
      for (const source of sources) {
        const option = document.createElement("option");
        option.value = source;
        option.textContent = source;
        sourceFilter.appendChild(option);
      }
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      addMessage("user", text);

      if (agentMode.value !== "legal_qa") {
        const endpoint = agentMode.value === "contract_review" ? "/api/contracts/review" : "/api/contracts/draft";
        const payload = agentMode.value === "contract_review"
          ? { contract_text: text, contract_type: "general_commercial" }
          : { template_type: "general_commercial", slots: { user_input: text } };
        const response = await fetch(`${API_BASE}${endpoint}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        addMessage("assistant", JSON.stringify(await response.json(), null, 2));
        return;
      }

      const assistantNode = addMessage("assistant", "");
      const wsUrl = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/api/stream`;
      const socket = new WebSocket(wsUrl);
      socket.onopen = () => {
        socket.send(JSON.stringify({ query: text, source_filter: sourceFilter.value || null, session_id: sessionId }));
      };
      socket.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === "token") assistantNode.textContent += data.token;
        if (data.type === "error") assistantNode.textContent = data.error;
        if (data.type === "end") socket.close();
        messages.scrollTop = messages.scrollHeight;
      };
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && event.ctrlKey) send();
    });
    init();
  </script>
</body>
</html>
