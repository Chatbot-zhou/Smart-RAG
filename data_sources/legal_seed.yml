documents:
  - id: civil_code_contract_demo
    title: 中华人民共和国民法典（合同编节选）
    domain: contract
    authority: 全国人民代表大会
    source_url: https://flk.npc.gov.cn/
    effective_date: "2021-01-01"
    status: effective
    text: |
      第四百六十四条 合同是民事主体之间设立、变更、终止民事法律关系的协议。
      婚姻、收养、监护等有关身份关系的协议，适用有关该身份关系的法律规定；没有规定的，可以根据其性质参照适用本编规定。
      第四百六十五条 依法成立的合同，受法律保护。依法成立的合同，仅对当事人具有法律约束力，但是法律另有规定的除外。
      第五百零九条 当事人应当按照约定全面履行自己的义务。当事人应当遵循诚信原则，根据合同的性质、目的和交易习惯履行通知、协助、保密等义务。

  - id: company_law_demo
    title: 中华人民共和国公司法（公司治理节选）
    domain: corporate
    authority: 全国人民代表大会常务委员会
    source_url: https://flk.npc.gov.cn/
    effective_date: "2024-07-01"
    status: effective
    text: |
      公司从事经营活动，应当遵守法律、行政法规，遵守社会公德、商业道德，诚实守信，接受政府和社会公众的监督，承担社会责任。
      公司股东会、董事会、监事会以及高级管理人员应当依照法律、行政法规和公司章程行使职权。
      公司股东滥用股东权利给公司或者其他股东造成损失的，应当依法承担赔偿责任。
      公司控股股东、实际控制人、董事、监事、高级管理人员不得利用关联关系损害公司利益。

  - id: labor_contract_law_demo
    title: 中华人民共和国劳动合同法（劳动合同节选）
    domain: labor
    authority: 全国人民代表大会常务委员会
    source_url: https://flk.npc.gov.cn/
    effective_date: "2013-07-01"
    status: effective
    text: |
      建立劳动关系，应当订立书面劳动合同。
      用人单位自用工之日起即与劳动者建立劳动关系。用人单位应当建立职工名册备查。
      已建立劳动关系，未同时订立书面劳动合同的，应当自用工之日起一个月内订立书面劳动合同。
      劳动合同应当具备劳动合同期限、工作内容和工作地点、工作时间和休息休假、劳动报酬、社会保险、劳动保护、劳动条件和职业危害防护等条款。

